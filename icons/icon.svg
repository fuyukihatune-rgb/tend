<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#14161a"/>
  <!-- soil -->
  <line x1="80" y1="390" x2="432" y2="390" stroke="#3a4555" stroke-width="12" stroke-linecap="round"/>
  <!-- trunk/stem -->
  <line x1="256" y1="388" x2="256" y2="250" stroke="#5aaa72" stroke-width="22" stroke-linecap="round" opacity="0.68"/>
  <!-- left branch -->
  <line x1="256" y1="330" x2="186" y2="276" stroke="#5aaa72" stroke-width="14" stroke-linecap="round" opacity="0.48"/>
  <!-- right branch -->
  <line x1="256" y1="330" x2="326" y2="276" stroke="#5aaa72" stroke-width="14" stroke-linecap="round" opacity="0.48"/>
  <!-- left lower branch -->
  <line x1="256" y1="308" x2="170" y2="248" stroke="#5aaa72" stroke-width="11" stroke-linecap="round" opacity="0.36"/>
  <!-- right lower branch -->
  <line x1="256" y1="308" x2="342" y2="248" stroke="#5aaa72" stroke-width="11" stroke-linecap="round" opacity="0.36"/>
  <!-- main canopy -->
  <ellipse cx="256" cy="200" rx="110" ry="88" fill="#5aaa72" opacity="0.86"/>
  <!-- side canopy left -->
  <ellipse cx="152" cy="256" rx="68" ry="55" fill="#5aaa72" opacity="0.7"/>
  <!-- side canopy right -->
  <ellipse cx="360" cy="256" rx="68" ry="55" fill="#5aaa72" opacity="0.7"/>
</svg>
